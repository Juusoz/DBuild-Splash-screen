<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover; /* no stretching */
    background: black;   /* fills empty space (letterbox) */
    opacity: 0;
  }

  .active {
    opacity: 1;
    z-index: 2;
  }

  .transition {
    transition: transform 1s ease, opacity 1s ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script>
/* ===========================
   USER SETTINGS
=========================== */
const mode = "left"; 
// "left", "right", "top", "bottom", "fade"

const displayTime = 5000;
const transitionTime = 1000;

/* ===========================
   LOAD IMAGES
=========================== */
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

/* ===========================
   UTILITIES
=========================== */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

/* ===========================
   SLIDESHOW LOGIC
=========================== */
let images = [];
let queue = [];
let container = document.getElementById("slideshow");

function createImage(src) {
  const img = document.createElement("img");
  img.src = src;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

function setStartPosition(img, mode) {
  switch(mode) {
    case "left": img.style.transform = "translateX(-100%)"; break;
    case "right": img.style.transform = "translateX(100%)"; break;
    case "top": img.style.transform = "translateY(-100%)"; break;
    case "bottom": img.style.transform = "translateY(100%)"; break;
    case "fade": img.style.opacity = "0"; break;
  }
}

function animateIn(img, mode) {
  // FORCE browser to apply initial position first
  img.getBoundingClientRect();

  requestAnimationFrame(() => {
    img.classList.add("active");

    switch(mode) {
      case "left":
      case "right":
      case "top":
      case "bottom":
        img.style.transform = "translate(0,0)";
        break;
      case "fade":
        img.style.opacity = "1";
        break;
    }
  });
}

function animateOut(img) {
  img.classList.remove("active");
  img.style.opacity = "0";
}

/* ===========================
   QUEUE
=========================== */
function getNextImage() {
  if (queue.length === 0) {
    queue = shuffle([...images]);
  }
  return queue.shift();
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  images = await loadImages();
  if (images.length === 0) return;

  queue = shuffle([...images]);

  let currentSrc = getNextImage();
  await preload(currentSrc);

  let current = createImage(currentSrc);
  current.classList.add("active");

  while (true) {
    await sleep(displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let nextImg = createImage(nextSrc);

    setStartPosition(nextImg, mode);

    animateIn(nextImg, mode);

    await sleep(50); // ensure visibility before removing old
    animateOut(current);

    await sleep(transitionTime);

    if (current.parentNode) {
      container.removeChild(current);
    }

    current = nextImg;
  }
}

start();
</script>

</body>
</html>
