<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
  }

  .transition {
    transition-property: transform, opacity;
    transition-timing-function: ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script src="config.js"></script>

<script>
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

let images = [];
let sequence = [];
let index = 0;
let lastImage = null;
let container = document.getElementById("slideshow");

function buildSequence() {
  sequence = shuffle([...images]);

  if (sequence.length > 1 && sequence[0] === lastImage) {
    const swapIndex = Math.floor(Math.random() * (sequence.length - 1)) + 1;
    [sequence[0], sequence[swapIndex]] = [sequence[swapIndex], sequence[0]];
  }

  index = 0;
}

function getNextImage() {
  if (index >= sequence.length) buildSequence();
  const next = sequence[index++];
  lastImage = next;
  return next;
}

function createImage(src, z = 1) {
  const img = document.createElement("img");
  img.src = src;
  img.style.zIndex = z;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

/* ===========================
   MOTION ENGINE
=========================== */
function applyMotion(img, duration) {
  if (!CONFIG.enableMotion) return;

  const zoomStart = rand(CONFIG.minZoom, CONFIG.maxZoom);
  const zoomEnd   = rand(CONFIG.minZoom, CONFIG.maxZoom);

  const rotStart = CONFIG.enableRotate ? rand(-CONFIG.maxRotation, CONFIG.maxRotation) : 0;
  const rotEnd   = CONFIG.enableRotate ? rand(-CONFIG.maxRotation, CONFIG.maxRotation) : 0;

  // Max translation based on zoom (prevents edges showing)
  const maxOffsetStart = (zoomStart - 1) * 50;
  const maxOffsetEnd   = (zoomEnd - 1) * 50;

  const txStart = CONFIG.enablePan ? rand(-maxOffsetStart, maxOffsetStart) : 0;
  const tyStart = CONFIG.enablePan ? rand(-maxOffsetStart, maxOffsetStart) : 0;

  const txEnd = CONFIG.enablePan ? rand(-maxOffsetEnd, maxOffsetEnd) : 0;
  const tyEnd = CONFIG.enablePan ? rand(-maxOffsetEnd, maxOffsetEnd) : 0;

  // Initial state
  img.style.transform = `
    translate(${txStart}%, ${tyStart}%)
    scale(${zoomStart})
    rotate(${rotStart}deg)
  `;

  forceReflow(img);

  // Animate over full display duration
  img.style.transitionDuration = duration + "ms";

  requestAnimationFrame(() => {
    img.style.transform = `
      translate(${txEnd}%, ${tyEnd}%)
      scale(${zoomEnd})
      rotate(${rotEnd}deg)
    `;
  });
}

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

/* ===========================
   TRANSFORMS
=========================== */
function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  document.title = CONFIG.title;

  images = await loadImages();
  if (!images.length) return;

  buildSequence();

  let currentSrc = CONFIG.startRandom ? getNextImage() : images[0];
  await preload(currentSrc);

  let current = createImage(currentSrc, 1);
  current.style.opacity = "1";

  applyMotion(current, CONFIG.displayTime + CONFIG.transitionTime);

  while (true) {
    await sleep(CONFIG.displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let next = createImage(nextSrc, 2);

    const [startPos, exitPos] = getTransforms(CONFIG.mode);

    next.style.transitionDuration = CONFIG.transitionTime + "ms";
    current.style.transitionDuration = CONFIG.transitionTime + "ms";

    applyMotion(next, CONFIG.displayTime + CONFIG.transitionTime);

    if (CONFIG.mode === "fade") {
      next.style.opacity = "0";
      next.style.transitionDuration = CONFIG.fadeDuration + "ms";
      current.style.transitionDuration = CONFIG.fadeDuration + "ms";

      forceReflow(next);

      next.style.opacity = "1";
      current.style.opacity = "0";

      await sleep(CONFIG.fadeDuration);

    } else if (CONFIG.slideStyle === "overlay") {
      next.style.transform += " " + startPos;

      forceReflow(next);

      next.style.transform = next.style.transform.replace(startPos, "");

      await sleep(CONFIG.transitionTime);

    } else if (CONFIG.slideStyle === "push") {
      next.style.transform += " " + startPos;

      forceReflow(next);

      next.style.transform = next.style.transform.replace(startPos, "");
      current.style.transform += " " + exitPos;

      await sleep(CONFIG.transitionTime);
    }

    if (current.parentNode) {
      container.removeChild(current);
    }

    current = next;
  }
}

start();
</script>

</body>
</html>
