<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

	img {
		position: absolute;
		width: 100%;
		height: 100%;
		object-fit: cover;
		opacity: 0;
		/* We use a wrapper transform to combine motion and transitions */
		transform-origin: center center; 
  }

  .motion-active {
    transition: transform var(--motion-dur) linear, opacity var(--trans-dur) ease-in-out;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script src="config.js"></script>

<script>
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function preload(src) {
  return new Promise(r => {
    const i = new Image();
    i.src = src;
    i.onload = r;
    i.onerror = r;
  });
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function force(el) {
  el.getBoundingClientRect();
}

/* ===========================
   STATE
=========================== */
let images = [];
let sequence = [];
let index = 0;
let lastImage = null;
let container = document.getElementById("slideshow");

/* ===========================
   SEQUENCE
=========================== */
function buildSequence() {
  sequence = shuffle([...images]);

  if (sequence.length > 1 && sequence[0] === lastImage) {
    let i = Math.floor(Math.random() * (sequence.length - 1)) + 1;
    [sequence[0], sequence[i]] = [sequence[i], sequence[0]];
  }

  index = 0;
}

function nextImage() {
  if (index >= sequence.length) buildSequence();
  const n = sequence[index++];
  lastImage = n;
  return n;
}

function createImage(src, z) {
  const img = document.createElement("img");
  img.src = src;
  img.style.zIndex = z;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

/* ===========================
   SAFE MOTION ENGINE
=========================== */
function applyMotion(img, duration) {
  if (!CONFIG.enableMotion) return;

  // 1. Calculate Minimum Scale to hide edges during rotation
  // A rotation of 3 degrees needs ~1.05 scale minimum. 
  // We add this to the user's minZoom.
  const angleRad = Math.abs(CONFIG.maxRotation) * (Math.PI / 180);
  const rotationPadding = Math.sin(angleRad) + Math.cos(angleRad); 
  const safeMin = Math.max(CONFIG.minZoom, rotationPadding);

  const zoomStart = rand(safeMin, CONFIG.maxZoom);
  const zoomEnd   = rand(safeMin, CONFIG.maxZoom);

  const rotStart = CONFIG.enableRotate ? rand(-CONFIG.maxRotation, CONFIG.maxRotation) : 0;
  const rotEnd   = CONFIG.enableRotate ? rand(-CONFIG.maxRotation, CONFIG.maxRotation) : 0;

  // 2. Calculate Translation (Panning)
  // We must ensure (scale - 1) * dimension / 2 is the max travel distance
  const getMaxOffset = (scale) => ({
    x: ((scale * 100) - 100) / 2, // percentage based is safer for different ratios
    y: ((scale * 100) - 100) / 2
  });

  const bStart = getMaxOffset(zoomStart);
  const bEnd = getMaxOffset(zoomEnd);

  const txStart = CONFIG.enablePan ? rand(-bStart.x, bStart.x) : 0;
  const tyStart = CONFIG.enablePan ? rand(-bStart.y, bStart.y) : 0;
  const txEnd = CONFIG.enablePan ? rand(-bEnd.x, bEnd.x) : 0;
  const tyEnd = CONFIG.enablePan ? rand(-bEnd.y, bEnd.y) : 0;

  // Set the duration as a CSS variable so it doesn't get overwritten easily
  img.style.setProperty('--motion-dur', duration + "ms");
  img.classList.add('motion-active');

  // Apply Start State
  img.style.transform = `scale(${zoomStart}) rotate(${rotStart}deg) translate(${txStart}%, ${tyStart}%)`;

  force(img);

  // Apply End State
  requestAnimationFrame(() => {
    img.style.transform = `scale(${zoomEnd}) rotate(${rotEnd}deg) translate(${txEnd}%, ${tyEnd}%)`;
  });
}

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

/* ===========================
   TRANSITIONS
=========================== */
function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  document.title = CONFIG.title;

  images = await loadImages();
  if (!images.length) return;

  buildSequence();

  let currentSrc = CONFIG.startRandom ? nextImage() : images[0];
  await preload(currentSrc);

  let current = createImage(currentSrc, 1);
  current.style.opacity = "1";

  let visibleDuration = CONFIG.displayTime +
    (CONFIG.mode === "fade" ? CONFIG.fadeDuration : CONFIG.transitionTime);

  applyMotion(current, visibleDuration);

  while (true) {
    await sleep(CONFIG.displayTime);

    let nextSrc = nextImage();
    await preload(nextSrc);

    let next = createImage(nextSrc, 2);

    let visibleDuration = CONFIG.displayTime +
      (CONFIG.mode === "fade" ? CONFIG.fadeDuration : CONFIG.transitionTime);

    applyMotion(next, visibleDuration);

    const [startPos, exitPos] = getTransforms(CONFIG.mode);

    next.style.transitionDuration = CONFIG.transitionTime + "ms";
    current.style.transitionDuration = CONFIG.transitionTime + "ms";

    if (CONFIG.mode === "fade") {
      next.style.opacity = "0";
      next.style.transitionDuration = CONFIG.fadeDuration + "ms";
      current.style.transitionDuration = CONFIG.fadeDuration + "ms";

      force(next);

      next.style.opacity = "1";
      current.style.opacity = "0";

      await sleep(CONFIG.fadeDuration);

    } else if (CONFIG.slideStyle === "overlay") {
      next.style.transform += " " + startPos;

      force(next);

      next.style.transform = next.style.transform.replace(startPos, "");

      await sleep(CONFIG.transitionTime);

    } else if (CONFIG.slideStyle === "push") {
      next.style.transform += " " + startPos;

      force(next);

      next.style.transform = next.style.transform.replace(startPos, "");
      current.style.transform += " " + exitPos;

      await sleep(CONFIG.transitionTime);
    }

    if (current.parentNode) {
      container.removeChild(current);
    }

    current = next;
  }
}

start();
</script>

</body>
</html>
