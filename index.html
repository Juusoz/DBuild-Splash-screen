<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Slideshow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
  }

  .active {
    opacity: 1;
  }

  .transition {
    transition-property: transform, opacity;
    transition-timing-function: ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script>
/* ===========================
   USER CONFIG
=========================== */
const config = {
  mode: "fade",              // left, right, top, bottom, fade
  slideStyle: "overlay",     // overlay, push
  displayTime: 5000,
  transitionTime: 1000,
  fadeDuration: 5000,
  randomizeEveryCycle: true,
  preventImmediateRepeat: true,
  startRandom: true
};

/* ===========================
   LOAD IMAGES
=========================== */
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

/* ===========================
   UTILITIES
=========================== */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

/* ===========================
   STATE
=========================== */
let images = [];
let queue = [];
let lastImage = null;
let container = document.getElementById("slideshow");

/* ===========================
   HELPERS
=========================== */
function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

function getNextImage() {
  if (queue.length === 0) {
    queue = config.randomizeEveryCycle ? shuffle([...images]) : [...images];

    if (config.preventImmediateRepeat && queue.length > 1 && queue[0] === lastImage) {
      const swapIndex = Math.floor(Math.random() * (queue.length - 1)) + 1;
      [queue[0], queue[swapIndex]] = [queue[swapIndex], queue[0]];
    }
  }

  const next = queue.shift();
  lastImage = next;
  return next;
}

function createImage(src, z = 1) {
  const img = document.createElement("img");
  img.src = src;
  img.style.zIndex = z;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  images = await loadImages();
  if (!images.length) return;

  queue = shuffle([...images]);

  let currentSrc = config.startRandom ? getNextImage() : images[0];
  await preload(currentSrc);

  let current = createImage(currentSrc, 1);
  current.style.opacity = "1";

  while (true) {
    await sleep(config.displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let next = createImage(nextSrc, 2);

    const [startPos, exitPos] = getTransforms(config.mode);

    // Apply transition durations
    next.style.transitionDuration = config.transitionTime + "ms";
    current.style.transitionDuration = config.transitionTime + "ms";

    if (config.mode === "fade") {
      next.style.opacity = "0";
      next.style.transitionDuration = config.fadeDuration + "ms";
      current.style.transitionDuration = config.fadeDuration + "ms";

      forceReflow(next);

      next.style.opacity = "1";
      current.style.opacity = "0";

      await sleep(config.fadeDuration);

    } else if (config.slideStyle === "overlay") {
      // NEW covers OLD completely → no fade needed
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";

      // Wait until new image fully covers old
      await sleep(config.transitionTime);

      // Remove old instantly (no fade)
    } else if (config.slideStyle === "push") {
      // Both move together
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";
      current.style.transform = exitPos;

      await sleep(config.transitionTime);
    }

    // Cleanup
    if (current.parentNode) {
      container.removeChild(current);
    }

    current = next;
  }
}

start();
</script>

</body>
</html>
