<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .slide {
    position: absolute;
    width: 100%;
    height: 100%;
    overflow: hidden; /* important */
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    will-change: transform, opacity;
    opacity: 0;
  }

  .transition {
    transition-property: transform, opacity;
    transition-timing-function: ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script src="config.js"></script>

<script>
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

/* ===========================
   SEQUENCE SYSTEM
=========================== */
let images = [];
let sequence = [];
let index = 0;
let lastImage = null;
let container = document.getElementById("slideshow");

function buildSequence() {
  sequence = shuffle([...images]);

  if (sequence.length > 1 && sequence[0] === lastImage) {
    const swapIndex = Math.floor(Math.random() * (sequence.length - 1)) + 1;
    [sequence[0], sequence[swapIndex]] = [sequence[swapIndex], sequence[0]];
  }

  index = 0;
}

function getNextImage() {
  if (index >= sequence.length) buildSequence();
  const next = sequence[index++];
  lastImage = next;
  return next;
}

/* ===========================
   MOTION GENERATOR
=========================== */
function getRandomMotion() {
  if (!CONFIG.enableMotion) return { start: "", end: "" };

  let scaleStart = CONFIG.zoom ? (1 + Math.random() * (CONFIG.maxZoom - 1)) : 1;
  let scaleEnd = CONFIG.zoom ? (1 + Math.random() * (CONFIG.maxZoom - 1)) : scaleStart;

  let rotateStart = CONFIG.rotate ? (Math.random() * 2 - 1) * CONFIG.maxRotate : 0;
  let rotateEnd = CONFIG.rotate ? (Math.random() * 2 - 1) * CONFIG.maxRotate : rotateStart;

  // Max safe pan based on zoom
  const maxOffsetStart = (scaleStart - 1) * 50;
  const maxOffsetEnd = (scaleEnd - 1) * 50;

  let txStart = CONFIG.pan ? (Math.random() * 2 - 1) * maxOffsetStart : 0;
  let tyStart = CONFIG.pan ? (Math.random() * 2 - 1) * maxOffsetStart : 0;

  let txEnd = CONFIG.pan ? (Math.random() * 2 - 1) * maxOffsetEnd : txStart;
  let tyEnd = CONFIG.pan ? (Math.random() * 2 - 1) * maxOffsetEnd : tyStart;

  return {
    start: `translate(${txStart}%, ${tyStart}%) scale(${scaleStart}) rotate(${rotateStart}deg)`,
    end: `translate(${txEnd}%, ${tyEnd}%) scale(${scaleEnd}) rotate(${rotateEnd}deg)`
  };
}

/* ===========================
   CREATE IMAGE
=========================== */
function createSlide(src, z) {
  const wrapper = document.createElement("div");
  wrapper.className = "slide";
  wrapper.style.zIndex = z;

  const img = document.createElement("img");
  img.src = src;
  img.classList.add("transition");

  wrapper.appendChild(img);
  container.appendChild(wrapper);

  return img;
}

/* ===========================
   TRANSFORMS
=========================== */
function getSlideTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  document.title = CONFIG.title || "Loading";

  images = await loadImages();
  if (!images.length) return;

  buildSequence();

  let currentSrc = CONFIG.startRandom ? getNextImage() : images[0];
  await preload(currentSrc);

  let current = createSlide(currentSrc, 1);
  current.style.opacity = "1";

  let motion = getRandomMotion();
  current.style.transform = motion.start;
  current.style.transitionDuration = CONFIG.displayTime + "ms";
  forceReflow(current);
  current.style.transform = motion.end;

  while (true) {
    await sleep(CONFIG.displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let next = createSlide(nextSrc, 2);

    const [startPos, exitPos] = getSlideTransforms(CONFIG.mode);

    next.style.transform = startPos;
    next.style.opacity = "1";
    next.style.transitionDuration = CONFIG.transitionTime + "ms";

    // Apply motion to next image
    let nextMotion = getRandomMotion();
    next.style.transform += " " + nextMotion.start;

    forceReflow(next);

    next.style.transform = "translate(0,0) " + nextMotion.end;

    if (CONFIG.slideStyle === "push") {
      current.style.transform = exitPos + " " + motion.end;
    }

    await sleep(CONFIG.transitionTime);

    if (current.parentNode) {
      container.removeChild(current);
    }

    current = next;
    motion = nextMotion;
  }
}

start();
</script>

</body>
</html>
