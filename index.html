<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
  }

  .transition {
    transition-property: transform, opacity;
    transition-timing-function: ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script>
/* ===========================
   USER CONFIG
=========================== */
const config = {
  mode: "fade",          // left, right, top, bottom, fade
  slideStyle: "overlay", // overlay, push
  displayTime: 5000,
  transitionTime: 1000,
  fadeDuration: 5000,
  startRandom: true
};

/* ===========================
   LOAD IMAGES
=========================== */
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

/* ===========================
   UTILITIES
=========================== */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

/* ===========================
   STATE
=========================== */
let images = [];
let sequence = [];
let index = 0;
let lastImage = null;
let container = document.getElementById("slideshow");

/* ===========================
   HELPERS
=========================== */
function buildSequence() {
  sequence = shuffle([...images]);

  // prevent repeat across loops
  if (sequence.length > 1 && sequence[0] === lastImage) {
    const swapIndex = Math.floor(Math.random() * (sequence.length - 1)) + 1;
    [sequence[0], sequence[swapIndex]] = [sequence[swapIndex], sequence[0]];
  }

  index = 0;
}

function getNextImage() {
  if (index >= sequence.length) {
    buildSequence();
  }

  const next = sequence[index++];
  lastImage = next;
  return next;
}

function createImage(src, z = 1) {
  const img = document.createElement("img");
  img.src = src;
  img.style.zIndex = z;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  images = await loadImages();
  if (!images.length) return;

  buildSequence();

  let currentSrc = config.startRandom ? getNextImage() : images[0];
  await preload(currentSrc);

  let current = createImage(currentSrc, 1);
  current.style.opacity = "1";

  while (true) {
    await sleep(config.displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let next = createImage(nextSrc, 2);

    const [startPos, exitPos] = getTransforms(config.mode);

    next.style.transitionDuration = config.transitionTime + "ms";
    current.style.transitionDuration = config.transitionTime + "ms";

    if (config.mode === "fade") {
      next.style.opacity = "0";
      next.style.transitionDuration = config.fadeDuration + "ms";
      current.style.transitionDuration = config.fadeDuration + "ms";

      forceReflow(next);

      next.style.opacity = "1";
      current.style.opacity = "0";

      await sleep(config.fadeDuration);

    } else if (config.slideStyle === "overlay") {
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";

      // wait until fully covered
      await sleep(config.transitionTime);

    } else if (config.slideStyle === "push") {
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";
      current.style.transform = exitPos;

      await sleep(config.transitionTime);
    }

    // cleanup AFTER fully hidden
    if (current.parentNode) {
      container.removeChild(current);
    }

    current = next;
  }
}

start();
</script>

</body>
</html>
