<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            overflow: hidden; background: #000;
            width: 100vw; height: 100vh;
        }

        #slideshow {
            position: relative;
            width: 100%; height: 100%;
            perspective: 1000px;
        }

        /* The wrapper handles the slide/fade logic */
        .slide-stage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            transition-timing-function: ease-in-out;
            z-index: 1;
        }

        /* The image handles the Ken Burns motion */
        .slide-stage img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            will-change: transform;
            transition-timing-function: linear; /* Crucial for smooth motion */
        }
    </style>
</head>
<body>

<div id="slideshow"></div>

<script src="config.js"></script>
<script>
/* ===========================
   UTILITIES & ENGINE
=========================== */
const container = document.getElementById("slideshow");
const rand = (min, max) => Math.random() * (max - min) + min;
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

async function loadImages() {
    try {
        const res = await fetch("images.json");
        return await res.json();
    } catch(e) {
        console.error("Failed to load images.json", e);
        return [];
    }
}

function preload(src) {
    return new Promise(r => {
        const i = new Image();
        i.src = src;
        i.onload = r; i.onerror = r;
    });
}

/**
 * Calculates the scale needed to ensure no black edges appear 
 * during rotation and panning.
 */
function getRequiredScale(angleDeg) {
    const rad = Math.abs(angleDeg * Math.PI / 180);
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    // Geometric scale to cover rotation
    const scaleForRotation = Math.abs(Math.cos(rad)) + (h / w) * Math.abs(Math.sin(rad));
    // Add a buffer for panning (0.1) and user zoom preference
    return Math.max(scaleForRotation + 0.1, CONFIG.maxZoom * 0.8);
}

/* ===========================
   CORE LOGIC
=========================== */
let allImages = [];
let queue = [];

function getNextImageUrl() {
    if (queue.length === 0) {
        queue = [...allImages].sort(() => Math.random() - 0.5);
    }
    return queue.pop();
}

function createSlide(src) {
    const stage = document.createElement("div");
    stage.className = "slide-stage";
    
    const img = document.createElement("img");
    img.src = src;
    
    stage.appendChild(img);
    container.appendChild(stage);
    return { stage, img };
}

function applyKenBurns(img, duration) {
    if (!CONFIG.enableMotion) return;

    let rot = 0;
    let endRot = 0;

    if (CONFIG.enableRotate) {
        rot = rand(-CONFIG.maxRotation, CONFIG.maxRotation);
        
        // Ensure the end rotation is at least CONFIG.minRotation away from start
        let attempt = 0;
        do {
            endRot = rand(-CONFIG.maxRotation, CONFIG.maxRotation);
            attempt++;
        } while (Math.abs(endRot - rot) < (CONFIG.minRotation || 1) && attempt < 10);
    }
    
    const startScale = getRequiredScale(rot);
    const endScale = startScale * rand(1.05, 1.15); 

    const panRange = (startScale - 1) * 20; 
    const moveX = CONFIG.enablePan ? rand(-panRange, panRange) : 0;
    const moveY = CONFIG.enablePan ? rand(-panRange, panRange) : 0;

    // 1. Set Initial State immediately
    img.style.transition = 'none';
    img.style.transform = `scale(${startScale}) rotate(${rot}deg) translate(0, 0)`;

    // 2. Use a double requestAnimationFrame to ensure the "none" transition 
    // is rendered before the actual animation starts.
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            img.style.transition = `transform ${duration}ms linear`;
            img.style.transform = `scale(${endScale}) rotate(${endRot}deg) translate(${moveX}px, ${moveY}px)`;
        });
    });
}

async function start() {
    allImages = await loadImages();
    if (!allImages.length) return;

    let current = null;

    while (true) {
        const nextSrc = getNextImageUrl();
        await preload(nextSrc);

        const next = createSlide(nextSrc);
        const transTime = CONFIG.mode === "fade" ? CONFIG.fadeDuration : CONFIG.transitionTime;
        const totalVisibleTime = CONFIG.displayTime + transTime;

        // Start motion immediately on creation
        applyKenBurns(next.img, totalVisibleTime + 1000);

        if (!current) {
            // First run
            next.stage.style.opacity = "1";
            current = next;
        } else {
            // Setup transition
            next.stage.style.zIndex = 2;
            next.stage.style.transition = `all ${transTime}ms ease-in-out`;
            current.stage.style.transition = `all ${transTime}ms ease-in-out`;

            if (CONFIG.mode === "fade") {
                next.stage.style.opacity = "0";
                next.stage.getBoundingClientRect(); // Force reflow
                next.stage.style.opacity = "1";
            } else {
                // Directional Slide
                const directions = {
                    left: "translateX(100%)",
                    right: "translateX(-100%)",
                    top: "translateY(100%)",
                    bottom: "translateY(-100%)"
                };
                const exitDirections = {
                    left: "translateX(-100%)",
                    right: "translateX(100%)",
                    top: "translateY(-100%)",
                    bottom: "translateY(100%)"
                };

                next.stage.style.transform = directions[CONFIG.mode];
                next.stage.getBoundingClientRect();
                next.stage.style.transform = "translateX(0) translateY(0)";
                
                if (CONFIG.slideStyle === "push") {
                    current.stage.style.transform = exitDirections[CONFIG.mode];
                }
            }

            // Wait for transition to finish
            await sleep(transTime);
            
            // Cleanup old slide
            if (current.stage.parentNode) {
                container.removeChild(current.stage);
            }
            current = next;
        }

        // Wait for display time before next loop
        await sleep(CONFIG.displayTime);
    }
}

document.addEventListener("DOMContentLoaded", start);
</script>
</body>
</html>
