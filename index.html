<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scale(1);
  }

  .transition {
    transition-property: transform, opacity;
    transition-timing-function: ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script src="config.js"></script>

<script>
/* ===========================
   LOAD IMAGES
=========================== */
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

/* ===========================
   UTILITIES
=========================== */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

function rand(min, max) {
  return Math.random() * (max - min) + min;
}

/* ===========================
   STATE
=========================== */
let images = [];
let sequence = [];
let index = 0;
let lastImage = null;
let container = document.getElementById("slideshow");

/* ===========================
   HELPERS
=========================== */
function buildSequence() {
  sequence = shuffle([...images]);

  if (sequence.length > 1 && sequence[0] === lastImage) {
    const swapIndex = Math.floor(Math.random() * (sequence.length - 1)) + 1;
    [sequence[0], sequence[swapIndex]] = [sequence[swapIndex], sequence[0]];
  }

  index = 0;
}

function getNextImage() {
  if (index >= sequence.length) buildSequence();
  const next = sequence[index++];
  lastImage = next;
  return next;
}

function createImage(src, z = 1) {
  const img = document.createElement("img");
  img.src = src;
  img.style.zIndex = z;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

/* ===========================
   MOTION EFFECT
=========================== */
function applyMotion(img) {
  if (!CONFIG.motion || !CONFIG.motion.enabled) return;

  const zoomStart = rand(CONFIG.motion.zoomMin, CONFIG.motion.zoomMax);
  const zoomEnd   = rand(CONFIG.motion.zoomMin, CONFIG.motion.zoomMax);

  const panX = rand(-CONFIG.motion.panMax, CONFIG.motion.panMax);
  const panY = rand(-CONFIG.motion.panMax, CONFIG.motion.panMax);

  // Initial state
  img.style.transform = `scale(${zoomStart}) translate(0%, 0%)`;

  // Force apply
  forceReflow(img);

  // Animate slowly
  img.style.transitionDuration = CONFIG.motion.duration + "ms";
  img.style.transform = `scale(${zoomEnd}) translate(${panX}%, ${panY}%)`;
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  document.title = CONFIG.title || "Slideshow";

  images = await loadImages();
  if (!images.length) return;

  buildSequence();

  let currentSrc = CONFIG.startRandom ? getNextImage() : images[0];
  await preload(currentSrc);

  let current = createImage(currentSrc, 1);
  current.style.opacity = "1";

  applyMotion(current);

  while (true) {
    await sleep(CONFIG.displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let next = createImage(nextSrc, 2);

    const [startPos, exitPos] = getTransforms(CONFIG.mode);

    next.style.transitionDuration = CONFIG.transitionTime + "ms";
    current.style.transitionDuration = CONFIG.transitionTime + "ms";

    if (CONFIG.mode === "fade") {
      next.style.opacity = "0";

      forceReflow(next);

      next.style.opacity = "1";
      current.style.opacity = "0";

      applyMotion(next);

      await sleep(CONFIG.fadeDuration);

    } else if (CONFIG.slideStyle === "overlay") {
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";

      applyMotion(next);

      await sleep(CONFIG.transitionTime);

    } else if (CONFIG.slideStyle === "push") {
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";
      current.style.transform = exitPos;

      applyMotion(next);

      await sleep(CONFIG.transitionTime);
    }

    if (current.parentNode) container.removeChild(current);
    current = next;
  }
}

start();
</script>

</body>
</html>
