<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loading...</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
}

#slideshow {
  position: relative;
  width: 100vw;
  height: 100vh;
}

/* OUTER container (handles slide/fade) */
.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  opacity: 0;
}

/* INNER image (handles Ken Burns) */
.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.transition {
  transition: transform 1s ease, opacity 1s ease;
}
</style>
</head>
<body>

<div id="slideshow"></div>

<script src="config.js"></script>

<script>
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

/* ===========================
   STATE
=========================== */
let images = [];
let sequence = [];
let index = 0;
let lastImage = null;
let container = document.getElementById("slideshow");

/* ===========================
   SEQUENCE
=========================== */
function buildSequence() {
  sequence = shuffle([...images]);

  if (sequence.length > 1 && sequence[0] === lastImage) {
    const swapIndex = Math.floor(Math.random() * (sequence.length - 1)) + 1;
    [sequence[0], sequence[swapIndex]] = [sequence[swapIndex], sequence[0]];
  }

  index = 0;
}

function getNextImage() {
  if (index >= sequence.length) {
    buildSequence();
  }

  const next = sequence[index++];
  lastImage = next;
  return next;
}

/* ===========================
   CREATE SLIDE (FIXED)
=========================== */
function createSlide(src, z = 1) {
  const slide = document.createElement("div");
  slide.className = "slide transition";
  slide.style.zIndex = z;

  const img = document.createElement("img");
  img.src = src;

  slide.appendChild(img);
  container.appendChild(slide);

  applyKenBurns(img);

  return slide;
}

/* ===========================
   KEN BURNS (FIXED)
=========================== */
function applyKenBurns(img) {
  if (!CONFIG.kenBurns?.enabled) return;

  const maxZoom = CONFIG.kenBurns.maxZoom;
  const maxPan = CONFIG.kenBurns.maxPan;

  const zoomIn = Math.random() > 0.5;

  const startScale = zoomIn ? 1 : maxZoom;
  const endScale = zoomIn ? maxZoom : 1;

  const maxOffset = (Math.max(startScale, endScale) - 1) / 2;

  const pan1x = (Math.random() * 2 - 1) * Math.min(maxPan, maxOffset);
  const pan1y = (Math.random() * 2 - 1) * Math.min(maxPan, maxOffset);

  const pan2x = (Math.random() * 2 - 1) * Math.min(maxPan, maxOffset);
  const pan2y = (Math.random() * 2 - 1) * Math.min(maxPan, maxOffset);

  // IMPORTANT: run longer than displayTime to avoid stopping early
  const duration = CONFIG.displayTime + CONFIG.transitionTime;

  img.style.transition = `transform ${duration}ms linear`;

  img.style.transform =
    `scale(${startScale}) translate(${pan1x * 100}%, ${pan1y * 100}%)`;

  forceReflow(img);

  requestAnimationFrame(() => {
    img.style.transform =
      `scale(${endScale}) translate(${pan2x * 100}%, ${pan2y * 100}%)`;
  });
}

/* ===========================
   TRANSFORMS
=========================== */
function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  document.title = CONFIG.title;

  images = await loadImages();
  if (!images.length) return;

  buildSequence();

  let current = createSlide(getNextImage(), 1);
  current.style.opacity = "1";

  while (true) {
    await sleep(CONFIG.displayTime);

    let next = createSlide(getNextImage(), 2);

    const [startPos, exitPos] = getTransforms(CONFIG.mode);

    next.style.transitionDuration = CONFIG.transitionTime + "ms";
    current.style.transitionDuration = CONFIG.transitionTime + "ms";

    if (CONFIG.mode === "fade") {
      next.style.opacity = "0";

      forceReflow(next);

      next.style.opacity = "1";
      current.style.opacity = "0";

      await sleep(CONFIG.fadeDuration);

    } else if (CONFIG.slideStyle === "overlay") {
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";

      await sleep(CONFIG.transitionTime);

    } else {
      next.style.transform = startPos;
      next.style.opacity = "1";

      forceReflow(next);

      next.style.transform = "translate(0,0)";
      current.style.transform = exitPos;

      await sleep(CONFIG.transitionTime);
    }

    if (current.parentNode) {
      container.removeChild(current);
    }

    current = next;
  }
}

start();
</script>

</body>
</html>
