<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
  }

  .active {
    opacity: 1;
    z-index: 2;
  }

  .transition {
    transition: all 1s ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script>
/* ===========================
   USER SETTINGS
=========================== */
const mode = "left"; 
// Options: "left", "right", "top", "bottom", "fade"

const delay = 3000; // time between slides

/* ===========================
   LOAD IMAGES
=========================== */
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

/* ===========================
   SLIDESHOW LOGIC
=========================== */
let images = [];
let index = 0;
let container = document.getElementById("slideshow");

function createImage(src) {
  const img = document.createElement("img");
  img.src = src;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

function setStartPosition(img, mode) {
  switch(mode) {
    case "left": img.style.transform = "translateX(-100%)"; break;
    case "right": img.style.transform = "translateX(100%)"; break;
    case "top": img.style.transform = "translateY(-100%)"; break;
    case "bottom": img.style.transform = "translateY(100%)"; break;
    case "fade": img.style.opacity = "0"; break;
  }
}

function animateIn(img, mode) {
  requestAnimationFrame(() => {
    img.classList.add("active");

    switch(mode) {
      case "left":
      case "right":
      case "top":
      case "bottom":
        img.style.transform = "translate(0,0)";
        break;
      case "fade":
        img.style.opacity = "1";
        break;
    }
  });
}

function animateOut(img) {
  img.classList.remove("active");
  img.style.opacity = "0";
}

/* ===========================
   START SLIDESHOW
=========================== */
async function start() {
  images = await loadImages();

  if (images.length === 0) return;

  let current = createImage(images[0]);
  current.classList.add("active");

  setInterval(() => {
    let nextIndex = (index + 1) % images.length;
    let nextImg = createImage(images[nextIndex]);

    setStartPosition(nextImg, mode);

    animateIn(nextImg, mode);
    animateOut(current);

    // Cleanup old image after transition
    setTimeout(() => {
      container.removeChild(current);
    }, 1000);

    current = nextImg;
    index = nextIndex;

  }, delay);
}

start();
</script>

</body>
</html>
