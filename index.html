<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Slideshow</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
  }

  #slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  img {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover; /* your change */
    opacity: 0;
  }

  .active {
    opacity: 1;
    z-index: 2;
  }

  .transition {
    transition: transform 1s ease, opacity 1s ease;
  }
</style>
</head>
<body>

<div id="slideshow"></div>

<script>
/* ===========================
   USER SETTINGS
=========================== */
const mode = "fade"; // "left", "right", "top", "bottom", "fade"
const slideStyle = "overlay"; // "overlay" or "push"
const displayTime = 5000;
const transitionTime = 5000;

/* ===========================
   LOAD IMAGES
=========================== */
async function loadImages() {
  const res = await fetch("images.json");
  return await res.json();
}

/* ===========================
   UTILITIES
=========================== */
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function preload(src) {
  return new Promise(resolve => {
    const img = new Image();
    img.src = src;
    img.onload = resolve;
    img.onerror = resolve;
  });
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

/* ===========================
   SLIDESHOW LOGIC
=========================== */
let images = [];
let queue = [];
let container = document.getElementById("slideshow");

function createImage(src) {
  const img = document.createElement("img");
  img.src = src;
  img.classList.add("transition");
  container.appendChild(img);
  return img;
}

function getTransforms(mode) {
  switch(mode) {
    case "left": return ["translateX(-100%)", "translateX(100%)"];
    case "right": return ["translateX(100%)", "translateX(-100%)"];
    case "top": return ["translateY(-100%)", "translateY(100%)"];
    case "bottom": return ["translateY(100%)", "translateY(-100%)"];
    default: return ["", ""];
  }
}

function forceReflow(el) {
  el.getBoundingClientRect();
}

/* ===========================
   QUEUE
=========================== */
let lastImage = null;

function getNextImage() {
  if (queue.length === 0) {
    queue = shuffle([...images]);

    // Prevent same image repeating across reshuffle
    if (queue.length > 1 && queue[0] === lastImage) {
      // swap first with another random item
      const swapIndex = Math.floor(Math.random() * (queue.length - 1)) + 1;
      [queue[0], queue[swapIndex]] = [queue[swapIndex], queue[0]];
    }
  }

  const next = queue.shift();
  lastImage = next;
  return next;
}

/* ===========================
   MAIN LOOP
=========================== */
async function start() {
  images = await loadImages();
  if (images.length === 0) return;

  queue = shuffle([...images]);

  let currentSrc = getNextImage();
  await preload(currentSrc);

  let current = createImage(currentSrc);
  current.classList.add("active");

  while (true) {
    await sleep(displayTime);

    let nextSrc = getNextImage();
    await preload(nextSrc);

    let nextImg = createImage(nextSrc);

    const [startPos, exitPos] = getTransforms(mode);

    if (mode === "fade") {
      // Simple fade mode
      nextImg.style.opacity = "0";
      forceReflow(nextImg);

      nextImg.classList.add("active");
      nextImg.style.opacity = "1";

      await sleep(50);
      current.style.opacity = "0";

    } else if (slideStyle === "overlay") {
      // NEW slides over OLD
      nextImg.style.transform = startPos;
      nextImg.style.opacity = "1";

      forceReflow(nextImg);

      nextImg.classList.add("active");
      nextImg.style.transform = "translate(0,0)";

      // fade old AFTER slide starts
      await sleep(200);
      current.style.opacity = "0";

    } else if (slideStyle === "push") {
      // BOTH slide together
      nextImg.style.transform = startPos;
      nextImg.style.opacity = "1";

      forceReflow(nextImg);

      nextImg.classList.add("active");

      // move both at same time
      nextImg.style.transform = "translate(0,0)";
      current.style.transform = exitPos;

    }

    await sleep(transitionTime);

    if (current.parentNode) {
      container.removeChild(current);
    }

    current = nextImg;
  }
}

start();
</script>

</body>
</html>
